# Demo: 10-service microservices architecture
#
# Usage: docker compose up gantry
# (starts only gantry — gantry manages the other services via Docker socket)
#
# Architecture:
#   Level 0 (data):      postgres, redis, rabbitmq
#   Level 1 (platform):  auth, cache (FLAKY)
#   Level 2 (app):       api, worker, mailer
#   Level 3 (frontend):  web, admin

services:
  gantry:
    image: ghcr.io/chaoyi/gantry:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
    container_name: demo-gantry
    command: serve
    environment:
      RUST_LOG: gantry=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gantry.yaml:/etc/gantry/config.yaml:ro
    ports:
      - "9090:9090"

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb

  redis:
    image: redis:7-alpine
    container_name: demo-redis

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: demo-rabbitmq

  auth:
    build: ./auth
    container_name: demo-auth

  cache:
    build: ./flaky-svc
    container_name: demo-cache

  api:
    build: ./slow-api
    container_name: demo-api

  worker:
    build: ./worker
    container_name: demo-worker

  mailer:
    build: ./worker
    container_name: demo-mailer

  web:
    image: nginx:alpine
    container_name: demo-web

  admin:
    image: nginx:alpine
    container_name: demo-admin
