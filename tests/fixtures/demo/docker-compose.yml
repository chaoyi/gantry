# Demo: 8 services in 2 isolated groups
#
# Group 1 (targets: infra, app) — recovery behaviors:
#   postgres, redis, crash-svc, stuck-svc, slow-heal, fast-heal
#
# Group 2 (targets: flaky-api-target, unstable) — converge failure:
#   flaky-api (crashes randomly), doomed (stops responding, restart_on_fail=false)

services:
  gantry:
    image: ghcr.io/chaoyi/gantry:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
      args:
        PROFILE: dev
    container_name: demo-gantry
    environment:
      RUST_LOG: gantry=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gantry.yaml:/etc/gantry/config.yaml:ro
    ports:
      - "9090:9090"

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb

  redis:
    image: redis:7-alpine
    container_name: demo-redis

  crash-svc:
    build: ./crash-svc
    container_name: demo-crash-svc

  stuck-svc:
    build: ./stuck-svc
    container_name: demo-stuck-svc

  slow-heal:
    build: ./slow-heal
    container_name: demo-slow-heal

  fast-heal:
    build: ./fast-heal
    container_name: demo-fast-heal

  flaky-api:
    build: ./flaky-api
    container_name: demo-flaky-api

  doomed:
    build: ./doomed
    container_name: demo-doomed
