# Demo: 8 services in 2 isolated groups
#
# ── Group 1: Recovery behaviors (targets: infra, app) ──
#   postgres, redis:  infrastructure
#   crash-svc:   exits when redis down        (restart_on_fail: true)
#   stuck-svc:   broken when postgres down    (restart_on_fail: true)
#   slow-heal:   reconnects in ~20s           (restart_on_fail: true)
#   fast-heal:   reconnects in ~2s            (restart_on_fail: false)
#
# ── Group 2: Flaky services (target: unstable) ──
#   flaky-api:   crashes randomly after 10-30s  (restart_on_fail: true)
#   doomed:      stops responding after ~5s     (restart_on_fail: false → converge fails)

services:
  # ── Group 1: infra ──
  postgres:
    container: demo-postgres
    probes:
      port:
        probe: { type: tcp, host: postgres, port: 5432, timeout: 15s }
      ready:
        probe: { type: log, success: "ready to accept connections", timeout: 15s }
        depends_on: [postgres.port]

  redis:
    container: demo-redis
    probes:
      port:
        probe: { type: tcp, host: redis, port: 6379, timeout: 5s }
      ready:
        probe: { type: log, success: "Ready to accept connections", timeout: 8s }
        depends_on: [redis.port]

  # ── Group 1: app services ──
  crash-svc:
    container: demo-crash-svc
    start_after: [redis.ready]
    probes:
      dep:
        probe: { type: log, success: "dependency connected", failure: "dependency lost", timeout: 5s }
        depends_on: [redis.ready]
      http:
        probe: { type: tcp, host: crash-svc, port: 8080, timeout: 5s }
        depends_on: [crash-svc.dep]

  stuck-svc:
    container: demo-stuck-svc
    start_after: [postgres.ready]
    probes:
      dep:
        probe: { type: log, success: "dependency connected", failure: "dependency check failed", timeout: 5s }
        depends_on: [postgres.ready]
      http:
        probe: { type: tcp, host: stuck-svc, port: 8080, timeout: 5s }
        depends_on: [stuck-svc.dep]

  slow-heal:
    container: demo-slow-heal
    start_after: [redis.ready]
    probes:
      dep:
        probe: { type: log, success: "dependency connected", failure: "dependency lost", timeout: 30s }
        depends_on: [redis.ready]
      http:
        probe: { type: tcp, host: slow-heal, port: 8080, timeout: 30s }
        depends_on: [slow-heal.dep]

  fast-heal:
    container: demo-fast-heal
    restart_on_fail: false
    start_after: [postgres.ready]
    probes:
      dep:
        probe: { type: log, success: "dependency connected", timeout: 5s }
        depends_on: [postgres.ready]
      http:
        probe: { type: tcp, host: fast-heal, port: 8080, timeout: 5s }
        depends_on: [fast-heal.dep]

  # ── Group 2: flaky services (no shared infra) ──
  flaky-api:
    container: demo-flaky-api
    probes:
      dep:
        probe: { type: log, success: "dependency connected", timeout: 5s }
      http:
        probe: { type: tcp, host: flaky-api, port: 8080, timeout: 5s }
        depends_on: [flaky-api.dep]

  doomed:
    container: demo-doomed
    restart_on_fail: false
    start_after: [flaky-api.ready]
    probes:
      dep:
        probe: { type: log, success: "dependency connected", timeout: 5s }
        depends_on: [flaky-api.ready]
      http:
        probe: { type: tcp, host: doomed, port: 8080, timeout: 8s }
        depends_on: [doomed.dep]

targets:
  # Group 1
  infra:
    probes: [postgres.ready, redis.ready]
  app:
    probes: [crash-svc.ready, stuck-svc.ready, slow-heal.ready, fast-heal.ready]
    depends_on: [infra]
  # Group 2 (fully isolated from group 1)
  unstable:
    probes: [doomed.ready]
    depends_on: [flaky-api-target]
  flaky-api-target:
    probes: [flaky-api.ready]

defaults:
  tcp_probe_timeout: 5s
  log_probe_timeout: 8s
  restart_on_fail: true
  probe_backoff: { initial: 100ms, max: 2s, multiplier: 2 }
